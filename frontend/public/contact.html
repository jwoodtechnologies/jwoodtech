<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jwood Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: #030303; color: #fff; font-family: 'Inter', sans-serif; font-weight: 300; overflow-x: hidden; }

    [data-reveal] { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
    [data-reveal].in { opacity: 1; transform: none; }
    [data-reveal="d1"] { transition-delay: 0.1s; }

    .site-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.28; z-index: -2; }
    .site-overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, rgba(3,3,3,0.55) 0%, rgba(3,3,3,0.2) 40%, rgba(3,3,3,0.7) 100%); pointer-events: none; }

    .island-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: min(94vw, 1000px); height: 54px; background: rgba(8,8,8,0.55); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 0 6px 0 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
    .nav-logo img { height: 14px; filter: brightness(0) invert(1); display: block; max-width: 120px; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-contact { background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); color: #fff; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.72rem; letter-spacing: 0.07em; padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.2); text-decoration: none; transition: background .2s, border-color .2s; white-space: nowrap; }
    .nav-contact:hover { background: rgba(255,255,255,0.17); border-color: rgba(255,255,255,0.32); }
    .nav-ham { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: background .2s; }
    .nav-ham:hover { background: rgba(255,255,255,0.13); }
    .nav-ham span { display: block; width: 15px; height: 1px; background: #fff; transition: transform .25s, opacity .25s; }
    .nav-ham.open span:nth-child(1) { transform: translateY(5px) rotate(45deg); }
    .nav-ham.open span:nth-child(2) { opacity: 0; }
    .nav-ham.open span:nth-child(3) { transform: translateY(-5px) rotate(-45deg); }
    .nav-drop { display: none; position: fixed; top: 82px; left: 50%; transform: translateX(-50%); width: min(94vw, 1000px); background: rgba(8,8,8,0.97); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; z-index: 999; }
    .nav-drop.open { display: block; }
    .nav-drop a { display: block; padding: 18px 28px; font-weight: 400; font-size: 0.9rem; color: rgba(255,255,255,0.55); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: color .2s, background .2s; }
    .nav-drop a:last-child { border-bottom: none; }
    .nav-drop a:hover { color: #fff; background: rgba(255,255,255,0.03); }
    /* Chat page */
    .chat-page { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: calc(54px + 40px + 20px) clamp(24px,5vw,60px) 80px; }
    .chat-card { width: 100%; max-width: 620px; background: rgba(10,10,10,0.72); backdrop-filter: blur(36px); -webkit-backdrop-filter: blur(36px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; overflow: hidden; }
    .chat-header { display: flex; align-items: center; gap: 14px; padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02); }
    .chat-avatar { width: 46px; height: 46px; border-radius: 50%; background: #000; border: 1px solid rgba(255,255,255,0.12); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-avatar img { width: 46px; height: 46px; object-fit: cover; display: block; }
    .chat-name { display: block; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.95rem; color: #fff; letter-spacing: -0.01em; }
    .chat-status { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: rgba(255,255,255,0.32); margin-top: 3px; }
    .chat-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; flex-shrink: 0; }
    .chat-messages { padding: 28px 22px; display: flex; flex-direction: column; gap: 18px; }
    .chat-msg { display: flex; align-items: flex-end; gap: 10px; animation: msgIn .35s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .chat-msg--out { flex-direction: row-reverse; }
    .chat-msg-av { width: 32px; height: 32px; border-radius: 50%; background: #000; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-msg-av img { width: 32px; height: 32px; object-fit: cover; }
    .chat-bubble { padding: 11px 16px; border-radius: 18px; font-size: 0.87rem; line-height: 1.6; max-width: 320px; }
    .chat-msg--in .chat-bubble { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.88); border-bottom-left-radius: 5px; }
    .chat-msg--out .chat-bubble { background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-bottom-right-radius: 5px; }
    .chat-opts { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 42px; }
    .chat-opt { background: transparent; border: 1px solid rgba(255,255,255,0.16); color: rgba(255,255,255,0.68); font-family: 'Inter', sans-serif; font-size: 0.8rem; padding: 9px 17px; border-radius: 100px; cursor: pointer; transition: border-color .2s, background .2s, color .2s; }
    .chat-opt:hover { border-color: rgba(255,255,255,0.36); background: rgba(255,255,255,0.06); color: #fff; }
    .chat-opt:disabled { opacity: 0.3; cursor: default; }
    .chat-form-area { padding: 8px 22px 22px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 8px; }
    .chat-form-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .chat-field { display: flex; flex-direction: column; gap: 5px; }
    .chat-field label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); }
    .chat-field input, .chat-field select, #chatMessageInput { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 11px 14px; font-family: 'Inter', sans-serif; font-weight: 300; font-size: 16px; color: #fff; outline: none; transition: border-color .2s; -webkit-appearance: none; }
    .chat-field input::placeholder { color: rgba(255,255,255,0.16); }
    .chat-field input:focus, .chat-field select:focus { border-color: rgba(255,255,255,0.24); }
    .chat-field select option { background: #111; color: #fff; }
    .chat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
    .chat-input-row textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 14px; font-family: 'Inter', sans-serif; font-weight: 300; font-size: 16px; color: #fff; outline: none; resize: none; transition: border-color .2s; min-height: 80px; }
    .chat-input-row textarea::placeholder { color: rgba(255,255,255,0.16); }
    .chat-input-row textarea:focus { border-color: rgba(255,255,255,0.24); }
    .chat-send { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s, border-color .2s; flex-shrink: 0; }
    .chat-send:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.32); }
    .typing-indicator { display: flex; align-items: center; gap: 10px; }
    .typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; border-bottom-left-radius: 5px; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); animation: typingDot 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingDot { 0%,60%,100% { opacity: 0.3; transform: scale(1); } 30% { opacity: 1; transform: scale(1.25); } }

    footer { background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.06); }
    .footer-inner { padding: 0 clamp(24px,6vw,80px); }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; padding: 28px 0; gap: 20px; flex-wrap: wrap; }
    .footer-left { display: flex; align-items: center; gap: 16px; }
    .footer-nav { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; }
    .footer-nav a { font-size: 0.7rem; color: rgba(255,255,255,0.22); text-decoration: none; letter-spacing: 0.06em; transition: color .2s; }
    .footer-nav a:hover { color: rgba(255,255,255,0.6); }
    .footer-copy { font-size: 0.68rem; color: rgba(255,255,255,0.18); letter-spacing: 0.04em; }
    @media (max-width: 700px) {
      .footer-nav { gap: 10px; }
      .footer-nav a { font-size: 0.62rem; }
      .chat-row { grid-template-columns: 1fr; }
      .chat-bubble { max-width: 260px; }
    }
  </style>
</head>
<body>

  <video class="site-video" autoplay muted playsinline loop preload="auto" disablepictureinpicture>
    <source src="/assets/hero-backdrop.mp4" type="video/mp4">
  </video>
  <div class="site-overlay"></div>

  <nav class="island-nav">
    <a href="/" class="nav-logo">
      <img src="/assets/IMG_6989.png" alt="Jwood Technologies" onerror="this.style.display='none'">
    </a>
    <div class="nav-right">
      <a href="/contact" class="nav-contact">Contact</a>
      <button class="nav-ham" id="navHam" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-drop" id="navDrop">
    <a href="/about">About</a>
    <a href="/services">Services</a>
    <a href="/consulting">Consulting</a>
    <a href="/products">Products</a>
    <a href="/careers">Careers</a>
    <a href="/contact">Contact</a>
  </div>

  <div class="chat-page">
    <div class="chat-card" data-reveal>
      <div class="chat-header">
        <div class="chat-avatar">
          <img src="/assets/jwod-logo.png" alt="Jwood Technologies" onerror="this.style.display='none'">
        </div>
        <div>
          <span class="chat-name">Jwood Technologies</span>
          <span class="chat-status"><span class="chat-dot"></span>Online — responds within 1 business day</span>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg chat-msg--in">
          <div class="chat-msg-av">
            <img src="/assets/jwod-logo.png" alt="" onerror="this.style.display='none'">
          </div>
          <div class="chat-bubble">Hey — how can we help you today?</div>
        </div>
        <div class="chat-opts" id="chatOpts">
          <button class="chat-opt" data-type="project">Start a project</button>
          <button class="chat-opt" data-type="consulting">Consulting</button>
          <button class="chat-opt" data-type="other">General inquiry</button>
        </div>
      </div>

      <div class="chat-form-area" id="chatFormArea" style="display:none;">
        <form id="chatForm" action="mailto:info@jwoodtechnologies.com" method="post" enctype="text/plain">
          <div class="chat-form-fields" id="chatFormFields"></div>
          <div class="chat-input-row">
            <textarea name="message" id="chatMessageInput" placeholder="Write your message..." required></textarea>
            <button type="submit" class="chat-send" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-bottom">
        <div class="footer-left">
          <a href="/"><img src="/assets/IMG_6989.png" alt="Jwood Technologies" style="height:16px;filter:brightness(0) invert(1);opacity:0.35;" onerror="this.style.display='none'"></a>
        </div>
        <ul class="footer-nav">
          <li><a href="/about">About</a></li>
          <li><a href="/services">Services</a></li>
          <li><a href="/consulting">Consulting</a></li>
          <li><a href="/products">Products</a>
    <a href="/careers">Careers</a></li>
          <li><a href="/contact">Contact</a></li>
          <li><a href="/terms">Legal</a></li>
        </ul>
        <span class="footer-copy">© 2026 Jwood Technologies</span>
      </div>
    </div>
  </footer>

  <script>
    // Nav
    const ham = document.getElementById('navHam'), drop = document.getElementById('navDrop');
    if (ham && drop) {
      ham.addEventListener('click', () => { ham.classList.toggle('open'); drop.classList.toggle('open'); });
      document.addEventListener('click', e => { if (!ham.contains(e.target) && !drop.contains(e.target)) { ham.classList.remove('open'); drop.classList.remove('open'); } });
      drop.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { ham.classList.remove('open'); drop.classList.remove('open'); }));
    }
    const io = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }); }, { threshold: 0.08 });
    document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));

    // Chat logic
    const chatMessages = document.getElementById('chatMessages');
    const chatOpts = document.getElementById('chatOpts');
    const chatFormArea = document.getElementById('chatFormArea');
    const chatFormFields = document.getElementById('chatFormFields');

    const RESPONSES = {
      project:    "Perfect. Tell us what you're building and we'll take it from there.",
      consulting: "Let's talk. Share your details and we'll be in touch to set up a call.",
      other:      "Of course — tell us what's on your mind."
    };

    const FIELDS_HTML = {
      project: `
        <div class="chat-row">
          <div class="chat-field"><label>First Name</label><input type="text" name="first_name" placeholder="First" required></div>
          <div class="chat-field"><label>Last Name</label><input type="text" name="last_name" placeholder="Last" required></div>
        </div>
        <div class="chat-field"><label>Email</label><input type="email" name="email" placeholder="you@company.com" required></div>
        <div class="chat-field"><label>Company</label><input type="text" name="company" placeholder="Company name"></div>
        <div class="chat-field"><label>Service</label>
          <select name="service">
            <option value="" disabled selected>What are you looking for?</option>
            <option>Automation &amp; Systems</option>
            <option>Platform Development</option>
            <option>Data &amp; Infrastructure</option>
            <option>Brand &amp; Design</option>
            <option>Software Conception</option>
            <option>Infrastructure</option>
            <option>Cybersecurity</option>
          </select>
        </div>`,
      consulting: `
        <div class="chat-row">
          <div class="chat-field"><label>First Name</label><input type="text" name="first_name" placeholder="First" required></div>
          <div class="chat-field"><label>Last Name</label><input type="text" name="last_name" placeholder="Last" required></div>
        </div>
        <div class="chat-field"><label>Email</label><input type="email" name="email" placeholder="you@company.com" required></div>
        <div class="chat-field"><label>Company / Role</label><input type="text" name="company" placeholder="Company or title"></div>
        <div class="chat-field"><label>Focus Area</label>
          <select name="consulting_area">
            <option value="" disabled selected>What do you need?</option>
            <option>Technology Strategy</option>
            <option>Digital Transformation</option>
            <option>Architecture Review</option>
            <option>Fractional CTO</option>
            <option>Cybersecurity Advisory</option>
          </select>
        </div>`,
      other: `
        <div class="chat-row">
          <div class="chat-field"><label>Name</label><input type="text" name="name" placeholder="Your name" required></div>
          <div class="chat-field"><label>Email</label><input type="email" name="email" placeholder="you@company.com" required></div>
        </div>`
    };

    function addMsg(type, text) {
      const msg = document.createElement('div');
      msg.className = `chat-msg chat-msg--${type}`;
      if (type === 'in') {
        msg.innerHTML = `<div class="chat-msg-av"><img src="/assets/jwod-logo.png" alt="" onerror="this.style.display='none'"></div><div class="chat-bubble">${text}</div>`;
      } else {
        msg.innerHTML = `<div class="chat-bubble">${text}</div>`;
      }
      chatMessages.appendChild(msg);
      msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showTyping() {
      const t = document.createElement('div');
      t.className = 'chat-msg chat-msg--in typing-indicator';
      t.id = 'typingIndicator';
      t.innerHTML = `<div class="chat-msg-av"><img src="/assets/jwod-logo.png" alt="" onerror="this.style.display='none'"></div><div class="typing-dots"><span></span><span></span><span></span></div>`;
      chatMessages.appendChild(t);
      t.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    chatOpts.querySelectorAll('.chat-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        chatOpts.querySelectorAll('.chat-opt').forEach(b => b.disabled = true);
        chatOpts.style.opacity = '0.35';
        chatOpts.style.pointerEvents = 'none';

        addMsg('out', btn.textContent);
        showTyping();

        setTimeout(() => {
          const t = document.getElementById('typingIndicator');
          if (t) t.remove();
          addMsg('in', RESPONSES[type]);
          chatFormFields.innerHTML = FIELDS_HTML[type];
          chatFormArea.style.display = 'block';
          setTimeout(() => chatFormArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }, 900);
      });
    });
  </script>
</body>
</html>
