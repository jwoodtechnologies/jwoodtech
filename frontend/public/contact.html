<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jwood Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: #030303; color: #fff; font-family: 'Inter', sans-serif; font-weight: 300; overflow-x: hidden; }

    [data-reveal] { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
    [data-reveal].in { opacity: 1; transform: none; }
    [data-reveal="d1"] { transition-delay: 0.1s; }
    [data-reveal="d2"] { transition-delay: 0.2s; }

    .site-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.28; z-index: -2; }
    .site-overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, rgba(3,3,3,0.55) 0%, rgba(3,3,3,0.2) 40%, rgba(3,3,3,0.7) 100%); pointer-events: none; }

    .island-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: min(94vw, 1000px); height: 54px; background: rgba(8,8,8,0.55); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 0 6px 0 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
    .nav-logo img { height: 14px; max-width: 130px; filter: brightness(0) invert(1); display: block; }
    .nav-center { display: flex; align-items: center; gap: 32px; }
    .nav-center a { font-weight: 400; font-size: 0.78rem; letter-spacing: 0.06em; color: rgba(255,255,255,0.5); text-decoration: none; transition: color .2s; }
    .nav-center a:hover { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-contact { background: #fff; color: #000; font-weight: 500; font-size: 0.75rem; letter-spacing: 0.08em; padding: 9px 20px; border-radius: 100px; text-decoration: none; transition: opacity .2s; white-space: nowrap; }
    .nav-contact:hover { opacity: 0.85; }
    .nav-ham { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: background .2s; }
    .nav-ham:hover { background: rgba(255,255,255,0.13); }
    .nav-ham span { display: block; width: 15px; height: 1px; background: #fff; transition: transform .25s, opacity .25s; }
    .nav-ham.open span:nth-child(1) { transform: translateY(5px) rotate(45deg); }
    .nav-ham.open span:nth-child(2) { opacity: 0; }
    .nav-ham.open span:nth-child(3) { transform: translateY(-5px) rotate(-45deg); }
    .nav-drop { display: none; position: fixed; top: 82px; left: 50%; transform: translateX(-50%); width: min(94vw, 1000px); background: rgba(8,8,8,0.97); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; z-index: 999; }
    .nav-drop.open { display: block; }
    .nav-drop a { display: block; padding: 18px 28px; font-weight: 400; font-size: 0.9rem; color: rgba(255,255,255,0.55); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: color .2s, background .2s; }
    .nav-drop a:last-child { border-bottom: none; }
    .nav-drop a:hover { color: #fff; background: rgba(255,255,255,0.03); }

    .page-hero { padding: calc(54px + 100px + 20px) clamp(24px,6vw,80px) 80px; }
    .page-label { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 18px; }
    .page-hero h1 { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: clamp(3.5rem,8vw,6.5rem); letter-spacing: -0.03em; line-height: 0.95; color: #fff; }

    .contact-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; padding: 0 clamp(24px,6vw,80px) 100px; background: rgba(0,0,0,0.55); border-top: 1px solid rgba(255,255,255,0.06); padding-top: 72px; align-items: start; }

    .info-group { padding: 22px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .info-group:last-child { border-bottom: none; }
    .info-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.22); margin-bottom: 6px; }
    .info-value { font-size: 0.92rem; color: rgba(255,255,255,0.65); }
    .info-value a { color: rgba(255,255,255,0.65); text-decoration: none; transition: color .2s; }
    .info-value a:hover { color: #fff; }

    .form-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .form-group label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.28); }
    .form-group input,
    .form-group textarea,
    .form-group select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 13px 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      color: #fff;
      width: 100%;
      outline: none;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.16); }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: rgba(255,255,255,0.32); background: rgba(255,255,255,0.06); }
    .form-group textarea { resize: vertical; min-height: 130px; }
    .form-group select option { background: #111; color: #fff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-submit { background: #fff; color: #000; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.1em; padding: 14px 32px; border-radius: 100px; border: none; cursor: pointer; width: 100%; margin-top: 6px; transition: opacity .2s; }
    .btn-submit:hover { opacity: 0.85; }

    footer { background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.06); }
    .footer-inner { padding: 0 clamp(24px,6vw,80px); }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; padding: 32px 0; gap: 24px; flex-wrap: wrap; }
    .footer-nav { display: flex; list-style: none; gap: 24px; flex-wrap: wrap; }
    .footer-nav a { font-size: 0.7rem; color: rgba(255,255,255,0.22); text-decoration: none; letter-spacing: 0.06em; transition: color .2s; }
    .footer-nav a:hover { color: rgba(255,255,255,0.6); }
    .footer-copy { font-size: 0.68rem; color: rgba(255,255,255,0.18); letter-spacing: 0.04em; }

    @media (max-width: 860px) {
      .nav-center { display: none; }
      .contact-layout { grid-template-columns: 1fr; gap: 48px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <video class="site-video" autoplay muted playsinline loop preload="auto" disablepictureinpicture>
    <source src="/assets/hero-backdrop.mp4" type="video/mp4">
  </video>
  <div class="site-overlay"></div>

  <nav class="island-nav">
    <a href="/" class="nav-logo">
      <img src="/assets/IMG_6989.png" alt="Jwood Technologies" onerror="this.style.display='none'">
    </a>
    <div class="nav-center">
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/careers">Careers</a>
    </div>
    <div class="nav-right">
      <a href="/contact" class="nav-contact">Contact</a>
      <button class="nav-ham" id="navHam" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-drop" id="navDrop">
    <a href="/about">About</a>
    <a href="/services">Services</a>
    <a href="/careers">Careers</a>
    <a href="/contact">Contact</a>
  </div>

  <div class="page-hero">
    <p class="page-label" data-reveal>Contact</p>
    <h1 data-reveal="d1">Let's build<br>something.</h1>
  </div>

  <div class="contact-layout">
    <div data-reveal>
      <div class="info-group">
        <p class="info-label">Email</p>
        <p class="info-value"><a href="mailto:info@jwoodtechnologies.com">info@jwoodtechnologies.com</a></p>
      </div>
      <div class="info-group">
        <p class="info-label">Response time</p>
        <p class="info-value">Within one business day</p>
      </div>
      <div class="info-group">
        <p class="info-label">Location</p>
        <p class="info-value">United States</p>
      </div>
    </div>

    <form data-reveal="d1" action="mailto:info@jwoodtechnologies.com" method="post" enctype="text/plain">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" placeholder="First" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" placeholder="Last" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" placeholder="Company name">
      </div>
      <div class="form-group">
        <label>Service</label>
        <select name="service">
          <option value="" disabled selected>Select a service</option>
          <option>Automation &amp; Systems</option>
          <option>Platform Development</option>
          <option>Data &amp; Infrastructure</option>
          <option>Brand &amp; Design</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="Tell us about your project." required></textarea>
      </div>
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-bottom">
        <a href="/"><img src="/assets/IMG_6989.png" alt="Jwood Technologies" style="height:18px;filter:brightness(0) invert(1);opacity:0.35;" onerror="this.style.display='none'"></a>
        <ul class="footer-nav">
          <li><a href="/about">About</a></li>
          <li><a href="/services">Services</a></li>
          <li><a href="/careers">Careers</a></li>
          <li><a href="/contact">Contact</a></li>
          <li><a href="/terms">Legal</a></li>
        </ul>
        <span class="footer-copy">© 2025 Jwood Technologies</span>
      </div>
    </div>
  </footer>

  <script>
    const ham=document.getElementById('navHam'),drop=document.getElementById('navDrop');
    if(ham&&drop){ham.addEventListener('click',()=>{ham.classList.toggle('open');drop.classList.toggle('open');});document.addEventListener('click',e=>{if(!ham.contains(e.target)&&!drop.contains(e.target)){ham.classList.remove('open');drop.classList.remove('open');}});drop.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{ham.classList.remove('open');drop.classList.remove('open');}));}
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.08,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));
  </script>
</body>
</html>
