services:
  - type: web
    name: jwoodtech
    runtime: python
    rootDir: backend
    plan: starter
    healthCheckPath: /api/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BACKEND_URL
        value: https://jwoodtech.onrender.com
      - key: FRONTEND_URL
        value: https://jwoodtechnologies.com
      - key: GOOGLE_REDIRECT_URI
        value: https://jwoodtech.onrender.com/api/auth/google/callback
      - key: CORS_ORIGINS
        value: https://jwoodtechnologies.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
